services:
  - type: web
    name: yandex-agent-direct-connector
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: DIRECT_CONNECTOR_PORT
        value: 10000
      - key: YANDEX_DIRECT_USE_SANDBOX
        value: false
