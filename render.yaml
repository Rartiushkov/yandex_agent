services:
  - type: web
    name: yandex-agent-direct-connector
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: DIRECT_CONNECTOR_PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: YANDEX_DIRECT_DEFAULT_MODE
        value: sandbox
      - key: YANDEX_DIRECT_READ_ONLY
        value: "true"
      - key: YANDEX_DIRECT_OAUTH_CLIENT_ID_SANDBOX
        sync: false
      - key: YANDEX_DIRECT_OAUTH_CLIENT_SECRET_SANDBOX
        sync: false
      - key: YANDEX_DIRECT_OAUTH_CLIENT_ID_PRODUCTION
        sync: false
      - key: YANDEX_DIRECT_OAUTH_CLIENT_SECRET_PRODUCTION
        sync: false
      - key: YANDEX_DIRECT_MASTER_TOKEN_SANDBOX
        sync: false
      - key: YANDEX_DIRECT_MASTER_TOKEN_PRODUCTION
        sync: false
      - key: YANDEX_DIRECT_CLIENT_LOGIN
        sync: false
